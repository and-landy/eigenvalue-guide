function useKatex(){
  const[ok,setOk]=useState(!!window.katex);
  useEffect(()=>{
    if(window.katex){setOk(true);return;}
    const l=document.createElement("link");l.rel="stylesheet";l.href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css";document.head.appendChild(l);

  },[]);
  return ok;
}
function K({children:tex,d=false}){
  const ref=useRef(null);
  const[,force]=useState(0);
  useEffect(()=>{if(!window.katex){const id=setInterval(()=>{if(window.katex){clearInterval(id);force(n=>n+1);}},100);return()=>clearInterval(id);}},[]);
  useEffect(()=>{if(ref.current&&window.katex)try{window.katex.render(tex,ref.current,{displayMode:d,throwOnError:false});}catch(e){ref.current.textContent=tex;}});
  return d?<div ref={ref} style={{margin:"10px 0",overflowX:"auto"}}/>:<span ref={ref}/>;
}

/* ═══ RK4 Phase Engine ═══ */
function rk4(A,x,y,dt){
  const f=(u,v)=>[A[0]*u+A[1]*v,A[2]*u+A[3]*v];
  const k1=f(x,y),k2=f(x+dt/2*k1[0],y+dt/2*k1[1]),k3=f(x+dt/2*k2[0],y+dt/2*k2[1]),k4=f(x+dt*k3[0],y+dt*k3[1]);
  return[x+dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]),y+dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1])];
}
function sim(A,x0,y0,dt,n,bd){
  const p=[[x0,y0]];let x=x0,y=y0;
  for(let i=0;i<n;i++){[x,y]=rk4(A,x,y,dt);if(Math.abs(x)>bd||Math.abs(y)>bd){p.push([Math.max(-bd,Math.min(bd,x)),Math.max(-bd,Math.min(bd,y))]);break;}p.push([x,y]);if(x*x+y*y<0.0004)break;}
  return p;
}
function getEigenvec(fl,lam){
  const r0=fl[0]-lam,r1=fl[1],r2=fl[2],r3=fl[3]-lam;
  const n1=Math.abs(r0)+Math.abs(r1),n2=Math.abs(r2)+Math.abs(r3);
  if(n1<1e-9&&n2<1e-9)return null;
  let vx,vy;
  if(n1>=n2){vx=-r1;vy=r0;}else{vx=-r3;vy=r2;}
  const len=Math.sqrt(vx*vx+vy*vy);
  return len>1e-9?[vx/len,vy/len]:null;
}

function PhaseSvg({A,size=220,c}){
  const S=size,C=S/2,BD=3.2;
  const toP=(x,y)=>[C+(x/BD)*(C-14),C-(y/BD)*(C-14)];
  const fl=[A[0][0],A[0][1],A[1][0],A[1][1]];
  const tr=fl[0]+fl[3],det=fl[0]*fl[3]-fl[1]*fl[2],disc=tr*tr-4*det;

  const{trails,evecs}=useMemo(()=>{
    const t=[];const dt=0.006;const evs=[];
    if(disc>=0&&det!==0){
      const sq=Math.sqrt(Math.max(0,disc));
      const l1=(tr+sq)/2,l2=(tr-sq)/2;
      const v1=getEigenvec(fl,l1),v2=getEigenvec(fl,l2);
      if(v1)evs.push({v:v1,c:det<0?(l1>0?"ev1":"ev2"):"ev1"});
      if(v2&&Math.abs(l1-l2)>1e-9)evs.push({v:v2,c:det<0?(l2>0?"ev1":"ev2"):"ev2"});
    }
    if(det<0){
      for(let a=0;a<2*Math.PI;a+=Math.PI/5)t.push(sim(fl,2.5*Math.cos(a),2.5*Math.sin(a),dt,600,BD));
    }else if(tr>0.001&&det>0){
      for(let a=0;a<2*Math.PI;a+=Math.PI/5)t.push(sim(fl,0.04*Math.cos(a),0.04*Math.sin(a),dt,900,BD));
    }else{
      for(let a=0;a<2*Math.PI;a+=Math.PI/5)t.push(sim(fl,2.6*Math.cos(a),2.6*Math.sin(a),dt,900,BD));
    }
    return{trails:t,evecs:evs};
  },[fl[0],fl[1],fl[2],fl[3]]);

  const gridL=[];
  for(let v=-3;v<=3;v++){if(!v)continue;const[sx]=toP(v,0),[,sy]=toP(0,v);
    gridL.push(<line key={`gx${v}`} x1={sx} y1={14} x2={sx} y2={S-14} stroke={c.grid} strokeWidth="0.5"/>);
    gridL.push(<line key={`gy${v}`} x1={14} y1={sy} x2={S-14} y2={sy} stroke={c.grid} strokeWidth="0.5"/>);
  }
  return(
    <svg viewBox={`0 0 ${S} ${S}`} width={S} style={{maxWidth:"100%",display:"block",borderRadius:10,background:c.bg3}}>
      {gridL}
      <line x1={14} y1={C} x2={S-14} y2={C} stroke={c.axis} strokeWidth="1"/>
      <line x1={C} y1={14} x2={C} y2={S-14} stroke={c.axis} strokeWidth="1"/>
      {evecs.map((ev,i)=>{
        const[x1,y1]=toP(-ev.v[0]*BD*0.9,-ev.v[1]*BD*0.9);
        const[x2,y2]=toP(ev.v[0]*BD*0.9,ev.v[1]*BD*0.9);
        return <line key={`ev${i}`} x1={x1} y1={y1} x2={x2} y2={y2} stroke={c[ev.c]} strokeWidth="1.5" strokeDasharray="6,4" opacity="0.7"/>;
      })}
      {trails.map((pts,i)=>{
        if(pts.length<2)return null;
        const sp=pts.map(([x,y])=>toP(x,y));
        const d=sp.map((p,j)=>(j===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(" ");
        const ai=Math.min(Math.floor(pts.length*0.65),pts.length-2);
        const[ax1,ay1]=sp[ai],[ax2,ay2]=sp[Math.min(ai+1,sp.length-1)];
        const dx=ax2-ax1,dy=ay2-ay1,al=Math.sqrt(dx*dx+dy*dy);
        let arrow=null;
        if(al>1){const ux=dx/al,uy=dy/al,px=-uy*4.5,py=ux*4.5,bx=ax2-ux*7,by=ay2-uy*7;
          arrow=<polygon key={`a${i}`} points={`${ax2},${ay2} ${bx+px},${by+py} ${bx-px},${by-py}`} fill={c.trail}/>;}
        return <g key={i}><path d={d} fill="none" stroke={c.trail} strokeWidth="1.3" opacity="0.6" strokeLinecap="round"/>{arrow}</g>;
      })}
      <circle cx={C} cy={C} r="3.5" fill={c.dot}/>
    </svg>
  );
}

    {tex:"\\boxed{\\mathbf{x}(t) = c_1 e^{-2t}\\begin{pmatrix}\\cos t\\\\-\\sin t\\end{pmatrix} + c_2 e^{-2t}\\begin{pmatrix}\\sin t\\\\\\cos t\\end{pmatrix}}"},
    {h:"5. Phase Portrait Analysis"},
    {p:"α = −2 < 0 — the e⁻²ᵗ factor causes exponential decay. Trajectories spiral inward toward the origin. This is an asymptotically stable spiral sink."},
    {p:"Rotation: a₂₁ = −1 < 0 → clockwise (CW). Arrows point toward origin."},
  ]},
  // ── Q7: Star Node ──
  {tk:"star",A:[[3,0],[0,3]],content:[
    {h:"1. Setup the Matrix"},
    {tex:"A = \\begin{pmatrix}3&0\\\\0&3\\end{pmatrix} = 3I"},
    {h:"2. Find the Eigenvalues"},
    {tex:"\\det(A - \\lambda I) = (3-\\lambda)^2 = 0 \\quad\\Longrightarrow\\quad \\lambda = 3 \\;\\;\\text{(repeated)}"},
    {h:"3. Check Diagonalizability"},
    {tex:"A - 3I = \\begin{pmatrix}0&0\\\\0&0\\end{pmatrix} \\quad\\Rightarrow\\quad \\text{rank} = 0"},
    {p:"Since A − 3I = 0, every nonzero vector is an eigenvector. There are two linearly independent eigenvectors, so A is diagonalizable — this is a star (proper) node."},
    {h:"4. General Solution"},
    {tex:"\\boxed{\\mathbf{x}(t) = e^{3t}\\begin{pmatrix}c_1\\\\c_2\\end{pmatrix} = e^{3t}\\,\\mathbf{x}(0)}"},
    {h:"5. Phase Portrait Analysis"},
    {p:"All trajectories are straight lines radiating from the origin — no bending, no spiraling. Since λ = 3 > 0, they move outward (unstable). If λ were negative, it would be a stable star node."},
  ]},
  // ── Q8: Improper Node ──
  {tk:"improper",A:[[-2,1],[0,-2]],content:[
    {h:"1. Setup the Matrix"},
    {tex:"A = \\begin{pmatrix}-2&1\\\\0&-2\\end{pmatrix}"},
    {h:"2. Find the Eigenvalues"},
    {tex:"\\det(A - \\lambda I) = (-2-\\lambda)^2 = 0 \\quad\\Longrightarrow\\quad \\lambda = -2 \\;\\;\\text{(repeated)}"},
    {h:"3. Check Diagonalizability"},
    {tex:"A - (-2)I = A + 2I = \\begin{pmatrix}0&1\\\\0&0\\end{pmatrix} \\quad\\Rightarrow\\quad \\text{rank} = 1"},
    {p:"Rank 1 means only one linearly independent eigenvector — the matrix is defective (Jordan block). This is an improper (degenerate) node."},
    {h:"4. Find Eigenvector and Generalized Eigenvector"},
    {p:"Eigenvector — solve (A + 2I)v = 0:"},
    {tex:"\\begin{pmatrix}0&1\\\\0&0\\end{pmatrix}\\mathbf{v} = \\mathbf{0} \\quad\\Rightarrow\\quad v_2 = 0 \\quad\\Rightarrow\\quad \\mathbf{v} = \\begin{pmatrix}1\\\\0\\end{pmatrix}"},
    {p:"Generalized eigenvector — solve (A + 2I)w = v:"},
    {tex:"\\begin{pmatrix}0&1\\\\0&0\\end{pmatrix}\\mathbf{w} = \\begin{pmatrix}1\\\\0\\end{pmatrix} \\quad\\Rightarrow\\quad w_2 = 1 \\quad\\Rightarrow\\quad \\mathbf{w} = \\begin{pmatrix}0\\\\1\\end{pmatrix}"},
    {h:"5. General Solution"},
    {p:"Using the Jordan block formula: x(t) = c₁eˡᵗv + c₂eˡᵗ(tv + w):"},
    {tex:"\\boxed{\\mathbf{x}(t) = c_1 e^{-2t}\\begin{pmatrix}1\\\\0\\end{pmatrix} + c_2 e^{-2t}\\left[t\\begin{pmatrix}1\\\\0\\end{pmatrix} + \\begin{pmatrix}0\\\\1\\end{pmatrix}\\right] = e^{-2t}\\begin{pmatrix}c_1 + c_2 t\\\\c_2\\end{pmatrix}}"},
    {h:"6. Phase Portrait Analysis"},
    {p:"λ = −2 < 0 — trajectories decay toward origin (stable). Unlike a star node, curves are not straight lines — the te⁻²ᵗ term causes bending."},
    {p:"All trajectories approach the origin tangent to the single eigenvector v = (1,0)ᵀ."},
    {p:"Key distinction: star node (2 eigenvectors) → straight lines; improper node (1 eigenvector) → curves that bend toward v."},
  ]},
];

/* ═══ Classify ═══ */
function fmtTex(x){return Math.abs(x-Math.round(x))<1e-9?String(Math.round(x)):x.toFixed(3).replace(/0+$/,"").replace(/\.$/,"");}
function classify(a,b,cv,d){
  const tr=a+d,det=a*d-b*cv,disc=tr*tr-4*det,eps=1e-10;
  if(Math.abs(det)<eps){
    if(Math.abs(a)+Math.abs(b)+Math.abs(cv)+Math.abs(d)<eps) return{type:"zero",evTex:"\\lambda_1=\\lambda_2=0",desc:"Zero matrix — every point is equilibrium.",stab:"—"};
    return{type:"degen",evTex:`\\lambda_1=${fmtTex(tr)},\\;\\lambda_2=0`,desc:"det(A) = 0 — non-isolated equilibria.",stab:"degenerate"};}
  if(det<-eps){const sq=Math.sqrt(disc),l1=(tr+sq)/2,l2=(tr-sq)/2;return{type:"saddle",evTex:`\\lambda_1=${fmtTex(l1)},\\;\\lambda_2=${fmtTex(l2)}`,stab:"unstable"};}
  if(disc<-eps){const al=tr/2,be=Math.sqrt(-disc)/2;const rot=cv>eps?"CCW":cv<-eps?"CW":"—";
    if(Math.abs(al)<eps) return{type:"center",evTex:`\\lambda=\\pm ${fmtTex(be)}\\,i`,rot,stab:"center"};
    if(al>0) return{type:"spiral_source",evTex:`\\lambda=${fmtTex(al)}\\pm ${fmtTex(be)}\\,i`,rot,stab:"unstable"};
    return{type:"spiral_sink",evTex:`\\lambda=${fmtTex(al)}\\pm ${fmtTex(be)}\\,i`,rot,stab:"stable"};}
  if(Math.abs(disc)<eps){const lam=tr/2;const isSc=Math.abs(a-lam)+Math.abs(b)+Math.abs(cv)+Math.abs(d-lam)<eps;
    if(isSc) return{type:"star",evTex:`\\lambda=${fmtTex(lam)}\\;\\text{(repeated)}`,stab:lam<0?"stable":"unstable"};
    return{type:"improper",evTex:`\\lambda=${fmtTex(lam)}\\;\\text{(repeated, defective)}`,stab:lam<0?"stable":"unstable"};}
  const sq=Math.sqrt(disc),l1=(tr+sq)/2,l2=(tr-sq)/2;
  if(tr>eps) return{type:"source",evTex:`\\lambda_1=${fmtTex(l1)},\\;\\lambda_2=${fmtTex(l2)}`,stab:"unstable"};
  return{type:"sink",evTex:`\\lambda_1=${fmtTex(l1)},\\;\\lambda_2=${fmtTex(l2)}`,stab:"stable"};
}

/* ═══ Badge ═══ */
function Badge({stab,c}){
  const m={stable:{col:c.grn,bg:c.grnbg,bd:c.grnbd,l:"Asymp. Stable（渐近稳定）"},
    unstable:{col:c.red,bg:c.redbg,bd:c.redbd,l:"Unstable（不稳定）"},
    center:{col:c.blu,bg:c.blubg,bd:c.blubd,l:"Lyapunov Stable（中性稳定）"},
    depends:{col:c.tx3,bg:c.bg3,bd:c.bd,l:"Depends on λ sign"},
    degenerate:{col:c.tx3,bg:c.bg3,bd:c.bd,l:"Degenerate（退化）"},
    "—":{col:c.tx3,bg:c.bg3,bd:c.bd,l:"—"}};
  const s=m[stab]||m["—"];
  return <span style={{display:"inline-block",padding:"3px 14px",borderRadius:14,fontSize:13,fontWeight:600,color:s.col,background:s.bg,border:`1px solid ${s.bd}`}}>{s.l}</span>;
}

                {l:"det=0",v:"1,2,2,4"}
              ].map(p=>{const[a,b,cv,d]=p.v.split(",");
                return <button key={p.l} onClick={()=>{const m={a,b,c:cv,d};setMat(m);setErr("");setCr(classify(+a,+b,+cv,+d));}}
                  style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${c.bd}`,background:"transparent",color:c.tx3,fontSize:13,fontFamily:mono,cursor:"pointer",margin:"3px 3px"}}>{p.l}</button>;
              })}
            </div>
          </div>
        </section>
      </main>

      <footer style={{maxWidth:960,margin:"40px auto 0",textAlign:"center",fontSize:13,color:c.tx3,fontFamily:mono}}>
        Eigenvalue Field Guide
      </footer>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
